media:
  input: public/images
  output: /images

content:
  - name: site_config
    label: サイト設定
    type: file
    path: content/config/site.yaml
    fields:
      - name: site_name
        label: サイト名
        type: string
      - name: catchcopy
        label: キャッチコピー
        type: string
      - name: phone
        label: 電話番号
        type: string
      - name: address
        label: 住所
        type: string
      - name: business_hours
        label: 営業時間
        type: string
      - name: email
        label: メールアドレス
        type: string

  - name: news
    label: お知らせ
    type: collection
    path: content/news
    view:
      fields: [title, date]
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: date
        label: 日付
        type: date
        required: true
      - name: slug
        label: スラッグ（URLに使用）
        type: string
        required: true
      - name: published
        label: 公開する
        type: boolean
        default: true
      - name: body
        label: 本文
        type: rich-text